<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <!-- viewport-fit=cover for the notch; do NOT rely on user-scalable=no (iOS ignores it) -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>~ d r i f t ~</title>
  <style>
    :root { color-scheme: dark; }
    html, body {
      height: 100vh; height: 100dvh;   /* dvh handles the iOS address bar */
      margin: 0; background: #0d0b08;
      overflow: hidden; overscroll-behavior: none;
    }
    /* touch-action:none blocks native scroll + pinch on the canvas (required) */
    #c { position: fixed; inset: 0; display: block; touch-action: none; }

    /* The single permitted UI chrome: a 7px connection dot, peripheral, fades after 2s. */
    #dot {
      position: fixed; right: 13px; bottom: 13px;
      width: 7px; height: 7px; border-radius: 50%;
      background: #4a4640; opacity: 0;
      transition: opacity .6s ease, background .4s ease;
      pointer-events: none;
    }
    #dot.connected   { background: #88a888; }
    #dot.reconnecting { background: #4a4640; }
    #dot.show { opacity: .4; }
    /* a slightly larger invisible hover target so the tiny dot is reachable */
    #dothit { position: fixed; right: 0; bottom: 0; width: 44px; height: 44px; }

    /* The one sound control: a small speaker icon — muted (slash) when silent,
       sounding (waves) when on. Peripheral; fades after 2s like the connection dot. */
    #snd {
      position: fixed; left: 11px; bottom: 11px;
      width: 19px; height: 19px; opacity: 0; color: #8a8478;
      transition: opacity .6s ease, color .4s ease;
      pointer-events: none;
    }
    #snd svg { width: 100%; height: 100%; display: block; fill: none;
      stroke: currentColor; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }
    #snd .spk { fill: currentColor; stroke: none; }       /* the speaker cone */
    #snd .waves { opacity: 0; transition: opacity .3s ease; } /* shown only when sounding */
    #snd .mute  { opacity: 1; transition: opacity .3s ease; } /* shown only when silent */
    #snd.on { color: #b9ad98; }
    #snd.on .waves { opacity: 1; }
    #snd.on .mute  { opacity: 0; }
    #snd.show { opacity: .5; }
    /* First-visit hint: a few gentle pulses so the sound control is findable (wordless). */
    @keyframes sndHint { 0%, 100% { opacity: .22; } 50% { opacity: .9; } }
    #snd.hint { animation: sndHint 1.8s ease-in-out 3; }
    #sndhit { position: fixed; left: 0; bottom: 0; width: 46px; height: 46px; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="dot"></div>
  <div id="dothit"></div>
  <div id="snd" role="img" aria-label="sound toggle">
    <svg viewBox="0 0 24 24">
      <path class="spk" d="M3 9.5 H6.5 L11 6 V18 L6.5 14.5 H3 Z"/>
      <g class="waves"><path d="M14.5 8.5 a4.5 4.5 0 0 1 0 7"/><path d="M17 6 a8 8 0 0 1 0 12"/></g>
      <line class="mute" x1="14.5" y1="8.5" x2="20.5" y2="15.5"/>
    </svg>
  </div>
  <div id="sndhit"></div>
  <script type="module" src="./client.js"></script>
</body>
</html>
